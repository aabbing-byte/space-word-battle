<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇宙單字大比拼 - 限時競賽版</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0B1026; margin: 0; overflow: hidden; }
        .animate-pulse-fast { animation: pulse 0.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .timer-bar { transition: width 1s linear; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // 自定義 SVG 圖標組件，解決外部函式庫載入失敗問題
        const Icons = {
            Play: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="5 3 19 12 5 21 5 3"/></svg>
            ),
            Volume2: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            ),
            ArrowLeft: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            ),
            ArrowRight: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            ),
            Home: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            ),
            Rocket: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-5c1.62-2.2 5-3 5-3"/><path d="M12 15v5s3.03-.55 5-2c2.2-1.62 3-5 3-5"/></svg>
            ),
            Brain: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.54z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.54z"/></svg>
            ),
            Star: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            ),
            Users: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            ),
            Trophy: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
            ),
            Zap: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            ),
            Settings2: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="2" y1="14" x2="6" y2="14"/><line x1="10" y1="8" x2="14" y2="8"/><line x1="18" y1="16" x2="22" y2="16"/></svg>
            ),
            Timer: (props) => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></svg>
            )
        };

        const WORDS = [
            { en: "star", zh: "星星", icon: "⭐", color: "text-yellow-300" },
            { en: "Earth", zh: "地球", icon: "🌍", color: "text-blue-400" },
            { en: "Sun", zh: "太陽", icon: "☀️", color: "text-orange-500" },
            { en: "Moon", zh: "月球", icon: "🌙", color: "text-gray-300" },
            { en: "planet", zh: "星球/行星", icon: "🪐", color: "text-purple-400" },
            { en: "Venus", zh: "金星", icon: "🟠", color: "text-orange-300" },
            { en: "Jupiter", zh: "木星", icon: "🟤", color: "text-amber-600" },
            { en: "Saturn", zh: "土星", icon: "🪐", color: "text-yellow-600" },
            { en: "Mars", zh: "火星", icon: "🔴", color: "text-red-500" },
            { en: "sky", zh: "天空", icon: "☁️", color: "text-blue-200" }
        ];

        const App = () => {
            const [view, setView] = useState('home'); 
            const [totalRounds, setTotalRounds] = useState(10);
            const [currentIndex, setCurrentIndex] = useState(0);
            
            // Battle States
            const [battleScores, setBattleScores] = useState({ teamA: 0, teamB: 0 });
            const [battleRound, setBattleRound] = useState(0);
            const [battleOptions, setBattleOptions] = useState([]);
            const [battleWinner, setBattleWinner] = useState(null); 
            const [phase, setPhase] = useState('ready'); // 'ready', 'answering', 'buffer'
            const [timeLeft, setTimeLeft] = useState(10);
            const [bufferLeft, setBufferLeft] = useState(3);

            const apiKey = ""; 

            // Timer Logic
            useEffect(() => {
                let interval;
                if (view === 'battle') {
                    if (phase === 'answering' && timeLeft > 0) {
                        interval = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                    } else if (phase === 'answering' && timeLeft === 0) {
                        setPhase('buffer');
                        setBufferLeft(3);
                    } else if (phase === 'buffer' && bufferLeft > 0) {
                        interval = setInterval(() => setBufferLeft(prev => prev - 1), 1000);
                    } else if (phase === 'buffer' && bufferLeft === 0) {
                        if (battleRound < totalRounds - 1) {
                            setBattleRound(prev => prev + 1);
                            setPhase('answering');
                            setTimeLeft(10);
                        } else {
                            setView('result');
                        }
                    }
                }
                return () => clearInterval(interval);
            }, [view, phase, timeLeft, bufferLeft, battleRound, totalRounds]);

            const getRandomOptions = useCallback((correctWord) => {
                const others = WORDS.filter(w => w.en !== correctWord.en);
                const shuffled = others.sort(() => Math.random() - 0.5).slice(0, 3);
                return [...shuffled, correctWord].sort(() => Math.random() - 0.5);
            }, []);

            useEffect(() => {
                if (view === 'battle') {
                    const currentWord = WORDS[battleRound % WORDS.length];
                    setBattleOptions(getRandomOptions(currentWord));
                    setBattleWinner(null);
                }
            }, [view, battleRound, getRandomOptions]);

            const startBattle = () => {
                setBattleRound(0);
                setBattleScores({ teamA: 0, teamB: 0 });
                setPhase('answering');
                setTimeLeft(10);
                setView('battle');
            };

            const handleBattleAnswer = (team, selectedEn) => {
                if (phase !== 'answering') return;
                const correctEn = WORDS[battleRound % WORDS.length].en;
                
                if (selectedEn === correctEn) {
                    setBattleWinner(team);
                    setBattleScores(prev => ({ ...prev, [team]: prev[team] + 1 }));
                    setPhase('buffer');
                    setBufferLeft(3);
                }
            };

            const HomeView = () => (
                <div className="flex flex-col items-center justify-center h-screen text-center p-6 space-y-8">
                    <div className="relative">
                        <Icons.Rocket className="w-24 h-24 text-blue-400 animate-bounce" />
                        <Icons.Star className="absolute -top-2 -right-2 w-8 h-8 text-yellow-300" />
                    </div>
                    <div>
                        <h1 className="text-4xl md:text-6xl font-black text-white mb-2">太空單字探險</h1>
                        <p className="text-slate-400 text-lg italic">限時競賽模式：10秒答題，3秒換位</p>
                    </div>
                    <div className="bg-slate-800/50 p-2 rounded-2xl border border-slate-700 flex items-center gap-2">
                        <div className="px-4 py-2 text-slate-400 font-bold flex items-center gap-2"><Icons.Settings2 className="inline mr-1" /> 總題數:</div>
                        {[10, 20].map((num) => (
                            <button key={num} onClick={() => setTotalRounds(num)} className={`px-6 py-2 rounded-xl font-black transition-all ${totalRounds === num ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-700'}`}>{num} 題</button>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-xl">
                        <button onClick={() => setView('learn')} className="bg-slate-800 hover:bg-slate-700 text-white p-6 rounded-2xl border border-slate-700 flex flex-col items-center group transition-all"><Icons.Brain className="mb-2 text-purple-400" size={32} /><span className="font-bold">單字預習</span></button>
                        <button onClick={startBattle} className="bg-gradient-to-br from-blue-600 to-indigo-700 hover:from-blue-500 hover:to-indigo-600 text-white p-6 rounded-2xl shadow-xl flex flex-col items-center group transition-all transform hover:scale-105">
                            <Icons.Zap className="mb-2 text-yellow-300 animate-pulse" size={32} />
                            <span className="font-bold">開始限時對戰</span>
                        </button>
                    </div>
                </div>
            );

            const BattleView = () => {
                const currentWord = WORDS[battleRound % WORDS.length];
                
                return (
                    <div className="flex flex-row h-screen bg-slate-950 overflow-hidden relative">
                        {/* 中央控制台 */}
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 bg-slate-900 border-4 border-slate-700 rounded-3xl p-8 shadow-2xl text-center min-w-[220px]">
                            {phase === 'answering' ? (
                                <div className="animate-in fade-in zoom-in duration-300">
                                    <div className="text-6xl mb-3">{currentWord.icon}</div>
                                    <div className="text-2xl font-black text-blue-400 mb-4 tracking-wider">「{currentWord.zh}」</div>
                                    <div className="flex flex-col items-center gap-2">
                                        <div className="flex items-center gap-2 text-yellow-500 font-black text-3xl">
                                            <Icons.Timer className={timeLeft <= 3 ? "text-red-500 animate-pulse-fast" : ""} />
                                            <span className={timeLeft <= 3 ? "text-red-500" : ""}>{timeLeft}s</span>
                                        </div>
                                        <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                                            <div className={`h-full timer-bar ${timeLeft <= 3 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${(timeLeft / 10) * 100}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center animate-in zoom-in">
                                    <div className="text-slate-500 font-bold mb-2">準備下一題</div>
                                    <div className="text-7xl font-black text-white mb-2">{bufferLeft}</div>
                                    <div className="text-blue-400 font-black animate-pulse uppercase tracking-widest">下一位選手就位</div>
                                </div>
                            )}
                            <div className="mt-6 pt-4 border-t border-slate-800 text-xs text-slate-500 font-bold uppercase tracking-widest">Round {battleRound + 1} / {totalRounds}</div>
                        </div>

                        {/* 兩隊區域 */}
                        <TeamSection team="teamA" label="TEAM A" color="bg-red-600" score={battleScores.teamA} options={battleOptions} onAnswer={handleBattleAnswer} isWinner={battleWinner === 'teamA'} phase={phase} correctEn={currentWord.en} side="left" />
                        <TeamSection team="teamB" label="TEAM B" color="bg-blue-600" score={battleScores.teamB} options={battleOptions} onAnswer={handleBattleAnswer} isWinner={battleWinner === 'teamB'} phase={phase} correctEn={currentWord.en} side="right" />
                    </div>
                );
            };

            const TeamSection = ({ team, label, color, score, options, onAnswer, isWinner, phase, correctEn, side }) => (
                <div className={`flex-1 flex flex-col items-center justify-center p-8 relative ${side === 'left' ? 'border-r border-slate-800' : ''}`}>
                    <div className="mb-12 text-center">
                        <div className={`text-sm font-black px-6 py-1 rounded-full mb-2 inline-block ${color} text-white shadow-lg`}>{label}</div>
                        <div className="text-7xl font-black text-white drop-shadow-lg">{score}</div>
                    </div>
                    
                    {isWinner && (
                        <div className="absolute inset-0 bg-green-500/20 flex items-center justify-center z-20 animate-in">
                            <Icons.Zap className="text-yellow-400 w-32 h-32 animate-bounce" />
                        </div>
                    )}

                    <div className="grid grid-cols-1 gap-4 w-full max-w-xs">
                        {options.map((opt, i) => (
                            <button 
                                key={i} 
                                onClick={() => onAnswer(team, opt.en)} 
                                disabled={phase !== 'answering'} 
                                className={`p-6 rounded-2xl font-black text-2xl transition-all active:scale-95 border-2 shadow-xl
                                    ${phase === 'buffer' && opt.en === correctEn ? 'bg-green-600 border-green-400 scale-105' : 
                                      phase === 'buffer' ? 'bg-slate-900 border-slate-800 opacity-30' : 
                                      'bg-slate-800 border-slate-700 hover:border-blue-500 hover:bg-slate-700'} 
                                    text-white`}
                            >
                                {opt.en}
                            </button>
                        ))}
                    </div>
                </div>
            );

            // --- 其他視圖 (Learn, Result) ---
            const LearnView = () => (
                <div className="flex flex-col h-screen bg-slate-900">
                    <div className="p-4 flex items-center justify-between">
                        <button onClick={() => setView('home')} className="p-2 hover:bg-slate-800 rounded-full text-white"><Icons.Home /></button>
                        <span className="text-slate-400 font-bold">{currentIndex + 1} / {WORDS.length}</span>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
                        <div className="bg-slate-800 rounded-3xl p-10 w-full max-w-sm border border-slate-700 shadow-2xl space-y-6 animate-in">
                            <div className="text-8xl">{WORDS[currentIndex].icon}</div>
                            <h2 className={`text-5xl font-black ${WORDS[currentIndex].color}`}>{WORDS[currentIndex].en}</h2>
                            <p className="text-2xl text-slate-300 font-bold">{WORDS[currentIndex].zh}</p>
                            <div className="text-slate-500 text-sm">發音功能請於程式碼中填入 API Key</div>
                        </div>
                    </div>
                    <div className="p-8 flex justify-between max-w-md mx-auto w-full">
                        <button onClick={() => setCurrentIndex(p => Math.max(0, p-1))} className="p-4 bg-slate-800 text-white rounded-2xl hover:bg-slate-700"><Icons.ArrowLeft /></button>
                        <button onClick={() => setCurrentIndex(p => Math.min(WORDS.length-1, p+1))} className="p-4 bg-slate-800 text-white rounded-2xl hover:bg-slate-700"><Icons.ArrowRight /></button>
                    </div>
                </div>
            );

            const ResultView = () => {
                const draw = battleScores.teamA === battleScores.teamB;
                const winner = battleScores.teamA > battleScores.teamB ? "TEAM A" : "TEAM B";
                return (
                    <div className="flex flex-col items-center justify-center h-screen text-center p-6 space-y-6 bg-slate-950">
                        <Icons.Trophy className="w-40 h-40 text-yellow-400 animate-bounce" />
                        <h2 className="text-6xl font-black text-white">競賽結束！</h2>
                        <div className="bg-slate-800 p-10 rounded-3xl border border-slate-700 shadow-[0_0_50px_rgba(37,99,235,0.2)]">
                            <p className="text-4xl font-black text-blue-300 mb-8 tracking-tighter">{draw ? "不分勝負，兩隊都是宇宙大師！" : `${winner} 成功統治銀河系！`}</p>
                            <div className="flex gap-16 justify-center items-center">
                                <div><div className="text-red-500 font-bold mb-2">TEAM A</div><div className="text-7xl font-black text-white">{battleScores.teamA}</div></div>
                                <div className="text-5xl text-slate-700 font-black">VS</div>
                                <div><div className="text-blue-500 font-bold mb-2">TEAM B</div><div className="text-7xl font-black text-white">{battleScores.teamB}</div></div>
                            </div>
                        </div>
                        <button onClick={() => setView('home')} className="mt-10 bg-white text-slate-900 font-black py-5 px-16 rounded-2xl shadow-xl hover:bg-slate-100 transition-all transform hover:scale-105 active:scale-95">返回首頁</button>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    {view === 'home' && <HomeView />}
                    {view === 'learn' && <LearnView />}
                    {view === 'battle' && <BattleView />}
                    {view === 'result' && <ResultView />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
